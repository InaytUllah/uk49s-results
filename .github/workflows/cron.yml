name: UK 49s draw-time cron

# Architecture: Static export on Cloudflare Pages.
# This workflow triggers a Cloudflare Pages rebuild around each UK 49s draw
# time. Cloudflare rebuilds the entire site with fresh data (scraped at build
# time) and deploys to its CDN. After deploy, we ping Google Indexing API so
# the new dated result pages get crawled fast.
#
# We poll on the 5-minute floor of GitHub Actions cron during four narrow
# draw windows (covers both BST and GMT shifts).
#
# Limits we live within:
#  - Cloudflare Pages free: 500 builds/month
#  - GitHub Actions free (private repo): 2,000 minutes/month
#  - Steady state: ~120-150 builds/month, ~600 GitHub minutes/month

on:
  schedule:
    # Brunchtime window: 9-11 UTC, every 5 minutes (covers 9:49 BST / 10:49 GMT)
    - cron: '*/5 9-11 * * *'
    # Lunchtime window: 11-13 UTC, every 5 minutes
    - cron: '*/5 11-13 * * *'
    # Drivetime + Teatime window: 15-18 UTC, every 5 minutes
    - cron: '*/5 15-18 * * *'
    # Daily indexing nudge at 6:07 UTC
    - cron: '7 6 * * *'
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages deploy
        run: |
          # Fire the deploy hook. Cloudflare queues a build; we don't wait for
          # it to finish here — the build happens in Cloudflare's CI, free.
          curl -sS -f -X POST "${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}" \
            | tee /dev/stderr
          echo ""
          echo "Triggered Cloudflare Pages deploy at $(date -u)"

  notify-google:
    runs-on: ubuntu-latest
    # Only do Google Indexing pings after the 6:07 UTC daily run — the
    # draw-time runs just deploy, Google will pick up new pages on its own
    # crawl schedule within hours.
    if: github.event.schedule == '7 6 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --omit=dev || npm install --omit=dev

      - name: Submit URLs to Google Indexing API
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: node scripts/notify-google.mjs
