name: Build and deploy to Cloudflare Pages

# Bypasses Cloudflare's dashboard build pipeline (which has been flaky for our
# Next.js static export). Instead, GitHub Actions builds locally and uses
# wrangler to push the `out/` folder directly to Cloudflare Pages.
#
# Triggers:
#  - Push to main (any code change)
#  - Scheduled cron during UK 49s draw windows (every 5 min)
#  - Manual via workflow_dispatch
#
# Required GitHub secrets:
#  - CLOUDFLARE_API_TOKEN  (create at https://dash.cloudflare.com/profile/api-tokens
#                           with permission: "Cloudflare Pages — Edit")
#  - CLOUDFLARE_ACCOUNT_ID (40bc87a52b5a97cda284020506728a48)

on:
  push:
    branches: [main]
  schedule:
    # UK 49s draw windows (UTC) — covers both BST and GMT
    - cron: '*/5 9-11 * * *'    # Brunchtime
    - cron: '*/5 11-13 * * *'   # Lunchtime
    - cron: '*/5 15-18 * * *'   # Drivetime + Teatime
    - cron: '7 6 * * *'         # Daily indexing nudge
  workflow_dispatch:

# Avoid two workflow runs racing the same deploy
concurrency:
  group: cloudflare-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Needed so the workflow can commit the accumulated results history back.
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Scrape the recent window and merge it into the committed history archive
      # so previously-indexed dated pages keep rendering 200 (never 404).
      # The script never deletes and never overwrites the file with less data.
      - name: Update results history
        run: node scripts/update-history.mjs
        continue-on-error: true

      # Persist any newly-seen draws for future builds. Pushes made with the
      # default GITHUB_TOKEN do not re-trigger workflows, so no loop. Only
      # commits when the file actually changed (new draw appeared).
      - name: Commit updated history
        run: |
          if [[ -n "$(git status --porcelain src/lib/data/results-history.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/lib/data/results-history.json
            git commit -m "chore: persist new UK 49s draws to history [skip ci]"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          else
            echo "No new draws — history unchanged."
          fi

      - name: Build static export
        run: npm run build

      - name: Ensure Pages project exists
        # wrangler pages deploy does NOT auto-create; we have to do it ourselves.
        # continue-on-error lets every run past the first one (when the project
        # already exists) succeed without failure.
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create uk49s-results --production-branch=main

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy --project-name=uk49s-results --branch=main --commit-dirty=true

  notify-google:
    # Only run on the daily 6:07 UTC cron, not every push or draw-window run.
    if: github.event.schedule == '7 6 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: build-and-deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Submit URLs to Google Indexing API
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: node scripts/notify-google.mjs
