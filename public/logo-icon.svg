<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="UK49s Results">
  <defs>
    <radialGradient id="ballGrad" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="45%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#065F46"/>
    </radialGradient>
    <radialGradient id="ballHighlight" cx="32%" cy="25%" r="35%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="ballShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- soft ground shadow -->
  <ellipse cx="100" cy="180" rx="55" ry="6" fill="#000" opacity="0.18"/>

  <!-- ball body -->
  <g filter="url(#ballShadow)">
    <circle cx="100" cy="95" r="78" fill="url(#ballGrad)"/>
    <!-- specular highlight -->
    <circle cx="100" cy="95" r="78" fill="url(#ballHighlight)"/>
    <!-- inner white ring -->
    <circle cx="100" cy="95" r="56" fill="none" stroke="#ffffff" stroke-width="4"/>
    <!-- "49" -->
    <text x="100" y="113" text-anchor="middle"
          font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
          font-weight="800" font-size="58" fill="#ffffff"
          letter-spacing="-1">49</text>
  </g>
</svg>
